defaults:
  repetitions: 3
  timeout_seconds: 240
  warmup_requests: 4
  temperature: 0.0
  top_p: 1.0
  stream: true

scenarios:
  latency_256_128:
    description: "Single-user latency baseline for SGLang."
    concurrency: [1]
    num_requests: 32
    input_tokens: 256
    max_tokens: 128

  chat_512_256:
    description: "Detailed chat/RAG concurrency sweep."
    concurrency: [1, 2, 4, 8, 16, 24, 32, 48, 64]
    num_requests: 128
    input_tokens: 512
    max_tokens: 256

  saturation_512_256:
    description: "SGLang saturation sweep; stop once errors or TTFT tail latency cross the limit."
    concurrency: [1, 2, 4, 8, 16, 24, 32, 48, 64, 80]
    num_requests: 192
    input_tokens: 512
    max_tokens: 256
    stop_on_error_rate_gt: 0.01
    stop_on_ttft_p95_ms_gt: 5000

  long_context_4096_256:
    description: "4K input context scaling."
    concurrency: [1, 2, 4, 8, 16]
    num_requests: 48
    input_tokens: 4096
    max_tokens: 256
    stop_on_error_rate_gt: 0.01
    stop_on_ttft_p95_ms_gt: 8000

  long_context_8192_256:
    description: "8K input context scaling."
    concurrency: [1, 2, 4, 8]
    num_requests: 24
    input_tokens: 8192
    max_tokens: 256
    stop_on_error_rate_gt: 0.01
    stop_on_ttft_p95_ms_gt: 12000

  prefix_cache_4096_256:
    description: "Shared-prefix workload for cache benefit."
    concurrency: [1, 4, 8, 16, 32]
    num_requests: 96
    input_tokens: 4096
    max_tokens: 256
    shared_prefix_ratio: 0.85
    stop_on_error_rate_gt: 0.01

  structured_json_512_256:
    description: "JSON output validity with concurrency."
    concurrency: [1, 4, 8, 16, 32]
    num_requests: 96
    input_tokens: 512
    max_tokens: 256
    json_mode: true
    stop_on_error_rate_gt: 0.01

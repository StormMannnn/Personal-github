system_prompt: "你是企业内部技术助手，用简洁、准确的中文回答问题。"

base_questions:
  - "如何评估一个大模型推理服务是否适合企业客服场景？"
  - "请说明 vLLM 的连续批处理为什么能提升吞吐。"
  - "如果一台服务器有两张消费级 GPU，部署 14B 模型时应该优先单卡量化还是双卡张量并行？"
  - "企业知识库问答系统如何降低首 token 延迟？"
  - "请列出大模型推理服务上线前必须压测的关键指标。"
  - "为什么长上下文会显著增加 KV Cache 显存占用？"
  - "请比较 AWQ、GPTQ 和 bitsandbytes 4bit 的适用场景。"
  - "如何设计一个 OpenAI-compatible 的模型网关？"
  - "请说明结构化 JSON 输出在企业应用中的价值和风险。"
  - "如果推理服务 p95 TTFT 超过 3 秒，应该从哪些方向排查？"

json_schema_prompt: |
  请只输出合法 JSON，不要包含 Markdown。JSON 字段如下：
  {
    "methods": ["字符串数组，列出优化方法"],
    "tools": ["字符串数组，列出可用工具"],
    "difficulty": "low|medium|high",
    "recommendation": "一句中文建议"
  }
  问题：如何优化企业大模型推理服务的吞吐和延迟？
